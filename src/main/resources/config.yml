#=============================================================================
# DEBUG & MONITORING SETTINGS
#=============================================================================

# Enables detailed logs and error messages in the console.
# Use this when troubleshooting issues or when support requests debugging info.
# When enabled, the plugin will output verbose information about operations.
# Recommended: Keep disabled in production, enable only when investigating issues.
enable-debug: false

# Enables performance monitoring and logging.
# When enabled, the plugin will log execution times for heavy operations such as:
# - Item sorting and filtering
# - Category matching and counting
# - Database loading and queries
# - Cache operations and rebuilds
# Useful for diagnosing performance issues with large auction houses (1000+ items).
# Recommended: Enable temporarily when experiencing lag or slow inventory loading.
enable-performance-debug: false

# Enables automatic version checking against the latest release.
# When enabled, the plugin will notify console/admins if a newer version is available.
# This does NOT auto-update the plugin, it only displays a notification.
# Recommended: Keep enabled to stay informed about important updates and bug fixes.
enable-version-checker: true

# Performance debug filter configuration.
# Allows you to focus on specific operations by filtering which ones are logged.
# Only relevant when 'enable-performance-debug' is set to true.
performance-debug:
  filter:
    # Filter mode options:
    # - DISABLED: Log all operations (default, no filtering)
    # - WHITELIST: Only log operations listed in 'operations'
    # - BLACKLIST: Log all operations EXCEPT those listed in 'operations'
    mode: DISABLED

    # List of operation names to filter.
    # Supports wildcard suffix (*) for prefix matching.
    # Example: "loadItems.*" matches loadItems.loadPlayers, loadItems.loadItemsFromDB, etc.
    #
    # Available operation names:
    # Loading operations:
    #   - loadItems.loadPlayers        : Time to load player data from database
    #   - loadItems.loadItemsFromDB    : Time to load items from database
    #   - loadItems.loadAuctionItemsFromDB : Time to load auction items from database
    #   - loadItems.processItems       : Time to process loaded items
    #   - loadItems.total              : Total loading time
    #   - loadItems.rebuildSortedItemsCache : Time to rebuild sorted cache
    #
    # Cache operations:
    #   - SortedItemsCache.rebuild     : Time to rebuild the sorted items cache
    #   - getItemsListedForSale        : Time to retrieve items for sale list
    #   - resolveItems[SALE]           : Time to resolve sale items
    #   - getItemIds[SALE]             : Time to get item IDs for sale
    #
    # Category operations:
    #   - applyCategories              : Time to apply category filters
    #   - computeCategoryCount[categoryId] : Time to count items per category
    #
    # Item operations:
    #   - item.BuildItemStack          : Time to build item stacks for display
    #   - item.CreatePlaceholders      : Time to create item placeholders
    #
    # Inventory operations:
    #   - openInventory.<file name>    : Time to open a specific inventory
    operations:
      - "loadItems.*"
      - "SortedItemsCache.*"

#=============================================================================
# GENERAL SETTINGS
#=============================================================================

# Date format used throughout the plugin for displaying timestamps.
# Uses Java SimpleDateFormat patterns.
# Common patterns:
#   dd    - Day of month (01-31)
#   MM    - Month (01-12)
#   yyyy  - Year (4 digits)
#   HH    - Hour in 24-hour format (00-23)
#   hh    - Hour in 12-hour format (01-12)
#   mm    - Minutes (00-59)
#   ss    - Seconds (00-59)
# Examples:
#   "dd/MM/yyyy HH:mm:ss" ‚Üí "25/12/2024 14:30:45"
#   "MM-dd-yyyy hh:mm a"  ‚Üí "12-25-2024 02:30 PM"
date-format: dd/MM/yyyy HH:mm:ss

# Timezone used for displaying dates.
# Uses Java TimeZone IDs. Set to "auto" to use the server's default timezone.
# Examples:
#   "auto"              ‚Üí Uses the server's default timezone
#   "UTC"               ‚Üí Coordinated Universal Time
#   "Europe/Paris"      ‚Üí Central European Time (UTC+1/UTC+2)
#   "America/New_York"  ‚Üí Eastern Time (UTC-5/UTC-4)
#   "Asia/Tokyo"        ‚Üí Japan Standard Time (UTC+9)
# Full list: https://docs.oracle.com/javase/8/docs/api/java/util/TimeZone.html
timezone: auto

#=============================================================================
# DATABASE CONFIGURATION
#=============================================================================

# Database storage type for auction data.
# Available options:
# - SQLITE  : Local file-based database (default, no setup required)
#             Best for: Single server, small to medium auction houses
# - MYSQL   : MySQL database server
#             Best for: Multi-server setups, large auction houses
# - MARIADB : MariaDB database server (MySQL-compatible)
#             Best for: Multi-server setups, large auction houses
# Note: For multi-server synchronization, use MySQL/MariaDB with the Redis addon.
storage-type: SQLITE

# Server name identifier for multi-server setups.
# This name is stored with each auction listing to identify which server it came from.
# Useful for tracking sales origin when using a shared database across multiple servers.
# Recommended: Use a unique, descriptive name (e.g., "skyblock", "survival", "creative").
server-name: skyblock

# Database connection settings for MySQL/MariaDB.
# Only used when 'storage-type' is set to MYSQL or MARIADB.
database-configuration:
  # Prefix applied to all database tables created by the plugin.
  # Useful when sharing a database with other plugins to avoid table name conflicts.
  # WARNING: Do not change this after the plugin has stored data, or data will be lost.
  # Default tables created: {prefix}items, {prefix}auction_items, {prefix}players, etc.
  table-prefix: zauctionhousev4_

  # IP address or hostname of the database server.
  # Use 'localhost' or '127.0.0.1' if the database is on the same machine.
  # For remote databases, use the server's IP address or domain name.
  host: 192.168.10.10

  # Port number of the database server.
  # Default MySQL/MariaDB port: 3306
  # Only change if your database uses a non-standard port.
  port: 3306

  # Username for database authentication.
  # This user must have permissions: SELECT, INSERT, UPDATE, DELETE, CREATE TABLE
  user: homestead

  # Password for the database user.
  # Keep this secure and don't share your configuration file publicly.
  password: secret

  # Name of the database where auction data will be stored.
  # The database must exist before the plugin starts.
  # The plugin will automatically create the required tables.
  database: zauctionhouse

  # Enables SQL query debugging.
  # When enabled, all SQL queries will be logged to console.
  # WARNING: This generates a lot of output. Only enable for database troubleshooting.
  # Recommended: Keep disabled in production.
  debug: false

#=============================================================================
# MESSAGE COLOR SHORTCUTS
#=============================================================================

# Custom color keys that can be used in messages throughout the plugin.
# These shortcuts simplify message customization by defining reusable color codes.
# Usage: Write <primary> in any message and it will be replaced with the hex color.
# Supports MiniMessage format and hex colors (#RRGGBB).
#
# Example usage in messages:
#   "<primary>Welcome <secondary>to the auction house!"
#   Becomes: "#24d65d Welcome #656665 to the auction house!"
message-colors:
  # Primary color - Used for important text, titles, highlights
  - key: <primary>
    color: '#24d65d'
  # Secondary color - Used for less important text, descriptions
  - key: <secondary>
    color: '#656665'
  # Error color - Used for error messages, warnings
  - key: <error>
    color: '#ff0000'
  # Success color - Used for success messages, confirmations
  - key: <success>
    color: '#00ff00'

#=============================================================================
# COMMAND CONFIGURATION
#=============================================================================

# Command configuration for aliases and arguments.
# IMPORTANT: Server restart required after changing this section!
# Changes to commands are not applied with /ah admin reload.

commands:
  # Main command: /zauctionhouse (opens the auction house)
  main-command:
    # Alternative command names that work identically to /zauctionhouse
    # Players can use any of these to open the auction house.
    aliases:
      - ah           # Short and common
      - hdv          # French abbreviation (H√ītel des Ventes)
      - auction      # Full English name
      - zauction     # Plugin-prefixed version

  # Sell command: /zauctionhouse sell <price> [amount] [economy]
  # Used by players to list items for sale on the auction house.
  sell:
    # When enabled, running /ah sell without arguments opens a GUI
    # where the player can select items, adjust price, and choose economy.
    # When disabled, /ah sell requires a price argument.
    # Recommended: Enable for better user experience, disable for command-line power users.
    enable-sell-inventory: false

    # Alternative names for the sell subcommand.
    # Example: /ah s 1000 (list item in hand for 1000)
    aliases:
      - sell
      - s
      - vendre       # French: "to sell"

    # Command arguments configuration
    arguments:
      # Price argument (required when sell inventory is disabled)
      - name: price
        display-name: price
        required: true
        # Tab completion suggestions for price
        # These appear when the player presses Tab while typing the command.
        auto-completion:
          - 1000
          - 10000
          - 25000

      # Amount argument (optional) - How many items to sell from the stack
      - name: amount
        display-name: amount
        required: false
        # %max-stack-size% is replaced with the item's maximum stack size
        auto-completion:
          - '1'
          - '%max-stack-size%'

      # Economy argument (optional) - Which currency to use
      - name: economy
        display-name: economy
        required: false
        # List your enabled economy names here for tab completion
        auto-completion:
          - vault

  # Claim command: /zauctionhouse claim
  # Used by players to claim pending money from sales (when auto-claim is disabled).
  claim:
    aliases:
      - claim
      - c
      - recuperer    # French: "to recover"

  # Search command: /zauctionhouse search <query>
  # Searches for items in the auction house by text.
  search:
    aliases:
      - search
      - s
      - rechercher   # French: "to search"
    arguments:
      - name: query
        display-name: query
        required: true
        auto-completion: []

  # Page command: /zauctionhouse page <number>
  # Opens the auction house at a specific page directly.
  page:
    aliases:
      - page
      - p
    arguments:
      - name: page
        display-name: page
        required: true
        auto-completion:
          - '1'
          - '2'
          - '3'
          - '5'
          - '10'

  # Custom inventory commands
  # These commands provide quick access to specific auction house sections.
  # Each entry creates a new subcommand under /zauctionhouse.
  inventories:
    # Command: /ah selling - Opens the player's currently listed items
    - enable: true
      # Permission required to use this command (leave empty for no permission)
      permission: "zauctionhouse.selling"
      # Description shown in help and tab completion
      description: "Open selling items"
      aliases:
        - 'selling'
      # Internal inventory identifier (see inventories/ folder)
      inventory: SELLING_ITEMS
      # Uncomment to enable page argument: /ah selling <page>
      # enable-page: true
      # page-name: "page"

    # Command: /ah expired - Opens the player's expired items
    - enable: true
      permission: "zauctionhouse.expired"
      description: "Open expired items"
      aliases:
        - 'expired'
      inventory: EXPIRED_ITEMS

    # Command: /ah purchased - Opens items the player has bought
    - enable: true
      permission: "zauctionhouse.purchased"
      description: "Open purchased items"
      aliases:
        - 'purchased'
      inventory: PURCHASED_ITEMS

    # Command: /ah history - Opens the player's sales history
    - enable: true
      permission: "zauctionhouse.history"
      description: "Open history"
      aliases:
        - 'history'
      inventory: HISTORY

  # Command cooldown configuration
  # Prevents players from spamming commands by enforcing a delay between executions.
  # NOTE: These values ARE reloaded with /ah admin reload.
  cooldown:

    # Default cooldown in milliseconds applied to all commands.
    # Set to 0 to disable the cooldown entirely.
    # WARNING: It is strongly recommended to keep a cooldown (e.g., 100ms) to prevent command spam.
    default-cooldown: 100

    # Permission that allows a player to bypass the command cooldown.
    bypass-permission: "zauctionhouse.cooldown.command.bypass"

    # Per-command cooldown overrides (in milliseconds).
    # Use the first alias of the command as the key.
    # Commands not listed here will use the default-cooldown value.
    # Examples:
    #   sell: 500      # 500ms cooldown for /ah sell
    #   claim: 1000    # 1 second cooldown for /ah claim
    #   page: 50       # 50ms cooldown for /ah page
    per-command: {}

#=============================================================================
# PRICE SHORTCUTS
#=============================================================================

# Number multiplication shortcuts for sell commands.
# Allows players to use shorthand notation for large numbers.
# Example: /ah sell 1K = /ah sell 1000
# Example: /ah sell 2.5M = /ah sell 2500000
number-sell-multiplication:
  # Enable or disable this feature
  enable: true

  # Format definitions (case-insensitive)
  # Players type the 'format' suffix, and the price is multiplied by 'multiplication'.
  formats:
    - format: K          # Thousand (1,000)
      multiplication: 1000
    - format: M          # Million (1,000,000)
      multiplication: 1000000
    - format: B          # Billion (1,000,000,000)
      multiplication: 1000000000
    - format: T          # Trillion
      multiplication: 1000000000000
    - format: Q          # Quadrillion
      multiplication: 1000000000000000
    - format: QQ         # Quintillion
      multiplication: 1000000000000000000
    - format: S          # Sextillion
      multiplication: 1000000000000000000000
    - format: SS         # Septillion
      multiplication: 1000000000000000000000000
    - format: O          # Octillion
      multiplication: 1000000000000000000000000000
    - format: N          # Nonillion
      multiplication: 1000000000000000000000000000000
    - format: D          # Decillion
      multiplication: 1000000000000000000000000000000000
    - format: UN         # Undecillion
      multiplication: 1000000000000000000000000000000000000
    - format: DD         # Duodecillion
      multiplication: 1000000000000000000000000000000000000000
    - format: TR         # Tredecillion
      multiplication: 1000000000000000000000000000000000000000000

#=============================================================================
# EXPIRATION SETTINGS
#=============================================================================

# Expiration times for various item states.
# All times are in SECONDS.
# Common values:
#   3600    = 1 hour
#   86400   = 1 day
#   172800  = 2 days
#   259200  = 3 days
#   604800  = 1 week
#   2592000 = 30 days

expiration:
  # How long auction listings remain active before expiring.
  auction:
    # Default expiration time in seconds (172800 = 2 days)
    # After this time, unsold items move to the "expired items" section.
    default-expiration: 2592000

    # Permission-based expiration times.
    # Players with specific permissions can have different expiration durations.
    permission:
      # Enable or disable permission-based expiration
      enable: false
      # Permission list (checked in order, first match is used)
      # IMPORTANT: Order from lowest to highest priority (default should be smallest)
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600       # 1 hour
        - permission: zauctionhouse.expiration.elite
          expiration: 7200       # 2 hours
        - permission: zauctionhouse.expiration.legend
          expiration: 259200     # 3 days

  # How long bid listings remain active (for future bid feature).
  bid:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  # How long rent listings remain active (for future rent feature).
  rent:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  # How long expired items are kept before permanent deletion.
  # After this time, expired items that weren't claimed are permanently lost.
  # Recommended: Set to at least 1 week to give players time to retrieve items.
  expire:
    default-expiration: 604800   # 1 week
    permission:
      enable: false

  # How long purchased items are kept before permanent deletion.
  # After this time, purchased items that weren't claimed are permanently lost.
  # Recommended: Set to at least 1 week to give players time to retrieve items.
  purchase:
    default-expiration: 604800   # 1 week
    permission:
      enable: false

#=============================================================================
# LISTING LIMITS
#=============================================================================

# Maximum number of items a player can have listed at once.
# Players need specific permissions to increase their limit.

permissions:
  # Limits for regular auction listings
  auction:
    - permission: zauctionhouse.max.5
      limit: 5
    - permission: zauctionhouse.max.10
      limit: 10
    - permission: zauctionhouse.max.15
      limit: 15

  # Limits for rent listings (future feature)
  rent:
    - permission: zauctionhouse.max.5
      limit: 5
    - permission: zauctionhouse.max.10
      limit: 10
    - permission: zauctionhouse.max.15
      limit: 15

  # Limits for bid listings (future feature)
  bid:
    - permission: zauctionhouse.max.5
      limit: 5
    - permission: zauctionhouse.max.10
      limit: 10
    - permission: zauctionhouse.max.15
      limit: 15

#=============================================================================
# WORLD RESTRICTIONS
#=============================================================================

# Worlds where players cannot create new listings.
# Players can still VIEW and BUY items, but cannot SELL.
# Useful for restricting sales in event worlds, minigame worlds, etc.
# Use exact world folder names (case-sensitive on Linux).

banned-worlds:
  # Worlds where auction listings are blocked
  auction:
    - "world_the_end"
  # Worlds where rent listings are blocked
  rent:
    - "world_the_end"
  # Worlds where bid listings are blocked
  bid:
    - "world_the_end"

