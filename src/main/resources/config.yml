#=============================================================================
# ITEM DISPLAY FORMATTING
#=============================================================================

# Configuration for how items are displayed in messages and lore.
# Used when showing item names in chat messages and notifications.

item-display:
  # Format for items using Minecraft's language translation keys
  # Used when the item has a translation key (most vanilla items)
  # Placeholders: %amount%, %item-translation-key%
  lang: "#8ee6e3x%amount% &7<lang:%item-translation-key%>"

  # Format for items with custom display names
  # Used when the item has a custom name set by plugins or anvils
  # Placeholders: %amount%, %item-name%
  item-name: "#8ee6e3x%amount% &7%item-name%"

  # Separator used between the last two items in a list
  # Example: "Diamond, Gold, and Emerald"
  and: " &fand "

  # Separator used between items in a list (except the last two)
  # Example: "Diamond, Gold, Iron"
  between: "&f, "

  # When enabled, similar items are merged in display
  # Example: "3x Diamond" instead of "Diamond, Diamond, Diamond"
  merge-similar-items: true

#=============================================================================
# TIME FORMAT
#=============================================================================

# Time unit labels and display formats for countdowns and durations.
# Used throughout the plugin for expiration timers, remaining time, etc.

time:
  # Time unit labels (singular and plural forms)
  second: gi√Ęy
  seconds: gi√Ęy

  minute: ph√ļt
  minutes: ph√ļt

  hour: giŠĽĚ
  hours: giŠĽĚ

  day: ng√†y
  days: ng√†y

  # Time format strings using printf-style placeholders
  # %02d = Number padded to 2 digits (e.g., 01, 05, 12)
  # %second%, %minute%, %hour%, %day% = Dynamic unit based on quantity
  #
  # Format for durations >= 1 day
  # Example output: "02ŠīÖ 05 ú 30Šīć"
  time-day: '%02dŠīÖ %02d ú %02dŠīć'

  # Format for durations >= 1 hour but < 1 day
  # Example output: "05 ú 30Šīć 45s"
  time-hour: '%02d ú %02dŠīć %02ds'

  # Format for durations >= 1 minute but < 1 hour
  # Example output: "30Šīć 45s"
  time-minute: '%02dŠīć %02ds'

  # Format for durations < 1 minute
  # Example output: "45s"
  time-second: '%02ds'

#=============================================================================
# ACTION BEHAVIOR
#=============================================================================

# Configuration for how different actions behave in the plugin.
# Controls what happens after purchases, removals, and other operations.

action:
  # When enabled, the auction inventory automatically refreshes when items are added or removed.
  # Disable if you experience performance issues with frequent updates.
  update-inventory-on-action: true

  # When enabled, the category filter is reset every time a player opens the auction house.
  # When disabled, the previously selected category persists between opens.
  reset-category-on-open: true

  # When enabled, the search filter is reset every time a player opens the auction house.
  # When disabled, the previously entered search query persists between opens.
  reset-search-on-open: true

  # Behavior when removing an item from active listings (seller cancels their sale)
  remove-listed-item:
    # If true, the item is immediately given to the player's inventory
    # If false, the item goes to their "expired items" section for later retrieval
    give-item: false

    # If true, reopens the auction inventory after removing the item
    open-inventory: true

    # If true, shows a confirmation GUI before removing the item
    # Recommended: Enable to prevent accidental removals
    open-confirm-inventory: true

  # Behavior when retrieving expired items
  remove-expired-item:
    # If true, reopens the expired items inventory after retrieval
    open-inventory: true

    # If true, the player must have free inventory space to retrieve the item
    # If false and no space available, the item will drop on the ground
    player-inventory-must-have-free-space: true

  # Behavior when purchasing items
  purchased-item:
    # If true, purchased items are immediately given to the buyer's inventory
    # If false, items go to their "purchased items" section for later retrieval
    give-item: false

    # If give-item is true, this checks if the player has enough inventory space
    # If false and no space available, the purchase is blocked
    player-inventory-must-have-free-space: true

    # If true, reopens the auction inventory after purchasing
    open-inventory: true

    # Visual feedback when the player doesn't have enough money
    money-item:
      # Enable or disable the visual feedback
      enable: true
      # Duration in ticks to show the error item (20 ticks = 1 second)
      duration: 60
      # Item displayed in place of the purchase when funds are insufficient
      item:
        material: BARRIER
        name: "#ff3535‚úė BŠļ°n kh√īng ńĎŠĽß tiŠĽĀn ńĎŠĽÉ mua vŠļ≠t phŠļ©m n√†y!"

    # If true, sends a chat message when the player can't afford the item
    money-message: true

    # Sound played when the player can't afford the item
    money-sound:
      enable: true
      # Sound category (affects volume sliders)
      category: MASTER
      # Minecraft sound identifier
      sound: minecraft:entity.villager.no
      # Volume level (0.0 to 1.0)
      volume: 1
      # Pitch (0.5 to 2.0, 1.0 is normal)
      pitch: 1

  # Behavior when retrieving items from "your items" (selling) inventory
  selling-item:
    # If true, reopens the selling items inventory after retrieval
    open-inventory: true

    # If true, the player must have free inventory space to retrieve the item
    # If false and no space available, the item will drop on the ground
    player-inventory-must-have-free-space: true

#=============================================================================
# AUTO-CLAIM CONFIGURATION
#=============================================================================

# Automatic money claiming for offline sales.
# When a player's item sells while they're offline, the money is stored as "pending".
# This configuration controls how that pending money is handled.

auto-claim:
  # If true, pending money is automatically deposited when the player joins
  # If false, players must manually run /ah claim to receive their money
  enable: false

  # Delay in ticks before auto-claiming on join (20 ticks = 1 second)
  # This allows time for the player to load fully before transactions.
  # Set to 0 for immediate claim (not recommended).
  delay-ticks: 20

  # If true, sends a message to the player when their money is auto-claimed
  notify-player: true

  # If auto-claim is disabled, this option notifies the player about pending money
  # Useful to remind players to claim their earnings
  notify-pending: true

  # Delay before sending the pending money notification
  notify-delay-ticks: 40

  # Reason string passed to the economy plugin for the transaction
  # May appear in economy logs or transaction history
  deposit-reason: "Claimed pending auction money"

#=============================================================================
# SALES NOTIFICATION
#=============================================================================

# Notifications sent to players about items sold while they were offline.
# This informs sellers about their successful sales when they rejoin.

sales-notification:
  # If true, players receive a summary of offline sales when they join
  enable: true

  # Delay in ticks before sending the notification (20 ticks = 1 second)
  # Higher values allow other join messages to appear first.
  delay-ticks: 60

#=============================================================================
# BROADCAST CONFIGURATION
#=============================================================================

# Broadcast messages to all online players when items are listed or purchased.
# Players can opt-out individually using /ah option.

broadcast:
  sell:
    # If true, a message is sent to all online players when an item is listed
    enable: false

    # If true, the seller will not see the broadcast message
    exclude-seller: true

  purchase:
    # If true, a message is sent to all online players when an item is purchased
    enable: false

    # If true, the buyer will not see the broadcast message
    exclude-buyer: true

  # Per-category message overrides (MiniMessage format).
  # If an item belongs to a category listed here, the custom message is used
  # instead of the default broadcast message from messages.yml.
  # The category key must match a category ID defined in categories.yml.
  # Available placeholders: %seller%, %buyer%, %items%, %price%, %category%
  #
  # Example:
  #   category-messages:
  #     sell:
  #       weapons: "<red><bold>WEAPON</bold></red> <white>%seller% <yellow>listed %items% <yellow>for <gold>%price%<yellow>!"
  #       armor: "<blue><bold>ARMOR</bold></blue> <white>%seller% <yellow>listed %items% <yellow>for <gold>%price%<yellow>!"
  #       enchanted-books: "<light_purple><bold>ENCHANT</bold></light_purple> <white>%seller% <yellow>listed %items% <yellow>for <gold>%price%<yellow>!"
  #     purchase:
  #       weapons: "<red><bold>WEAPON</bold></red> <white>%buyer% <yellow>purchased %items% <yellow>from <white>%seller% <yellow>for <gold>%price%<yellow>!"
  #       armor: "<blue><bold>ARMOR</bold></blue> <white>%buyer% <yellow>purchased %items% <yellow>from <white>%seller% <yellow>for <gold>%price%<yellow>!"
  #       enchanted-books: "<light_purple><bold>ENCHANT</bold></light_purple> <white>%buyer% <yellow>purchased %items% <yellow>from <white>%seller% <yellow>for <gold>%price%<yellow>!"
  category-messages:
    sell: {}
    purchase: {}

#=============================================================================
# PERFORMANCE CONFIGURATION
#=============================================================================

# Advanced performance settings for large auction houses.
# These settings control caching, parallel processing, and timeouts.
# Most servers won't need to change these defaults.

performance:
  # Cache configuration for sorted item lists.
  # The cache pre-sorts items to provide O(1) access for pagination.
  cache:
    # Minimum number of items before using parallel sorting (Arrays.parallelSort).
    # Parallel sorting improves performance for large datasets but has overhead for small ones.
    # Recommended: 10000 for most servers. Lower if you have many CPU cores available.
    parallel-sort-threshold: 10000

    # Minimum number of items before processing categories in parallel.
    # Categories are processed concurrently when this threshold is exceeded.
    # Recommended: 5000 for most servers.
    parallel-category-threshold: 5000

    # Number of threads to use for parallel processing.
    # Set to -1 to auto-detect (uses available processors - 1, minimum 2).
    # Set to a specific number to override auto-detection.
    parallelism: -1

  # Timeout configuration for cluster operations (multi-server setups).
  # These timeouts prevent operations from hanging indefinitely.
  # All values are in milliseconds.
  cluster-timeout:
    # Timeout for checking item availability across servers.
    check-availability-ms: 5000

    # Timeout for acquiring a lock on an item.
    lock-item-ms: 5000

    # Timeout for releasing a lock on an item.
    unlock-item-ms: 3000

    # Timeout for notifying other servers about status changes.
    notify-status-change-ms: 3000

    # Timeout for notifying other servers about item purchases/removals.
    notify-item-action-ms: 5000

#=============================================================================
# SORTING CONFIGURATION
#=============================================================================

# Item sorting options for the auction house display.
# Controls how items are ordered when viewing listings.

sort-items:
  # Default sort type applied when a player first opens the auction house
  # Options: ASCENDING_PRICE, ASCENDING_DATE, DECREASING_DATE, DECREASING_PRICE
  default-sort: DECREASING_DATE

  # Display names for each sort type in the GUI
  translations:
    ASCENDING_PRICE: "Gi√° thŠļ•p nhŠļ•t"
    ASCENDING_DATE: "CŇ© nhŠļ•t"
    DECREASING_DATE: "MŠĽõi nhŠļ•t"
    DECREASING_PRICE: "Gi√° cao nhŠļ•t"

#=============================================================================
# SEARCH FILTERS CONFIGURATION
#=============================================================================

# Configures the search filter operators used in the search system.
# Each filter type maps to an operator string that players type in the search bar.
#
# Example usage: "seller = Notch", "name ~ Diamond", "material ~= sword"
#
# WARNING: Operators must be unique. Avoid operators that are prefixes of others
# (e.g., "=" and "==" are fine because longer operators are matched first).

search-filters:
  # Contains (case-sensitive): field ~ value
  CONTAINS: "~"
  # Exact match (case-sensitive): field = value
  EQUALS: "="
  # Contains (ignore case): field ~= value
  CONTAINS_IGNORE_CASE: "~="
  # Exact match (ignore case): field == value
  EQUALS_IGNORE_CASE: "=="

################################################################################################################################
# MIGRATION FROM OTHER PLUGINS
################################################################################################################################
# This section allows you to migrate data from other auction plugins to zAuctionHouse V4.
#
# HOW TO MIGRATE:
# 1. Configure the appropriate source section below with your old plugin's database settings
# 2. Stop your server and backup all data (CRITICAL!)
# 3. Start the server with zAuctionHouse V4
# 4. Run: /ah admin migrate <source> confirm
#
# SUPPORTED SOURCES:
#   - zauctionhousev3 (aliases: zah, zahv3, v3)
#   - zelauction (aliases: zel, zelauctions) - requires ZelAuction plugin running + hook enabled
#
# WARNING: Always backup your data before migrating! Migration cannot be undone.

migration:

  #============================================================
  # zAuctionHouse V3 Migration
  #============================================================
  # Migrates data from zAuctionHouse V3 to V4.
  # Command: /ah admin migrate zauctionhousev3 confirm
  zauctionhouse-v3:
    # Source storage type from V3
    # Options: MYSQL, MARIADB, SQLITE, or JSON
    source-type: SQLITE

    # Table prefix used in your V3 installation
    # Check your V3 config.yml if unsure (default was "zauctionhouse_")
    table-prefix: "zauctionhouse_"

    # === SQLite Configuration ===
    # Path to the V3 SQLite database file (relative to server root)
    sqlite-path: "plugins/zAuctionHousev3/database.db"

    # === MySQL/MariaDB Configuration ===
    # Only needed if source-type is MYSQL or MARIADB
    host: "localhost"
    port: 3306
    database: "zauctionhouse"
    user: "root"
    password: ""

    # === JSON Configuration ===
    # Path to the V3 data folder containing JSON storage files
    json-folder: "plugins/zAuctionHouseV3"

  #============================================================
  # Future Migration Sources
  #============================================================
  # Additional migration sources will be added in future updates.
  # Examples:
  # axauctions:
  #   source-type: SQLITE
  #   sqlite-path: "plugins/AxAuctions/data.db"

################################################################################################################################
# ADMIN GENERATE CONFIGURATION
################################################################################################################################
# Configuration for the /ah admin generate command.
# This command creates dummy auction items for performance testing.
#
# USAGE: /ah admin generate <amount>
#
# WARNING: Generated items are for TESTING ONLY. Delete them after testing.

admin-generate:

  #============================================================
  # Expiration Time Configuration
  #============================================================
  # Controls the expiration time of generated items.

  expiration:
    # Mode: FIXED or RANDOM
    # FIXED: All items use 'fixed' value
    # RANDOM: Items get a random value between 'min' and 'max'
    mode: RANDOM

    # Fixed expiration time in seconds (used when mode is FIXED)
    fixed: 172800  # 2 days

    # Minimum expiration time in seconds (used when mode is RANDOM)
    min: 3600      # 1 hour

    # Maximum expiration time in seconds (used when mode is RANDOM)
    max: 604800    # 7 days

  #============================================================
  # Price Configuration
  #============================================================
  # Controls the price of generated items.

  price:
    # Mode: FIXED or RANDOM
    mode: RANDOM

    # Fixed price (used when mode is FIXED)
    fixed: 1000

    # Minimum price (used when mode is RANDOM)
    min: 10

    # Maximum price (used when mode is RANDOM)
    max: 1000000

  #============================================================
  # Item Amount Configuration
  #============================================================
  # Controls the stack size of generated items.

  item-amount:
    # Mode: FIXED or RANDOM
    mode: RANDOM

    # Fixed amount (used when mode is FIXED)
    # Will be capped at the item's max stack size
    fixed: 1

    # Minimum amount (used when mode is RANDOM)
    min: 1

    # Maximum amount (used when mode is RANDOM)
    # Use -1 to use the item's max stack size as maximum
    max: -1

  #============================================================
  # Bulk Items Configuration
  #============================================================
  # Bulk items are listings with multiple items (like shulker boxes).
  # They appear with a special icon in the auction house.

  bulk-items:
    # Percentage of generated items that will be bulk items (0-100)
    percentage: 15

    # Minimum number of items in a bulk listing
    min-items: 2

    # Maximum number of items in a bulk listing
    max-items: 27

  #============================================================
  # Economy Configuration
  #============================================================
  # Which economies to use for generated items.

  economies:
    # List of economy names to use (must match names in economies.yml)
    # Items will be randomly assigned to one of these economies.
    # If empty, uses the default economy.
    list:
      - vault

    # If true, distribute items evenly across economies.
    # If false, randomly pick an economy for each item.
    even-distribution: false
