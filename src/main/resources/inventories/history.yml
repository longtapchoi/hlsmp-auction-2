name: '#0c1719Lịch sử bán hàng (%page%/%max-page%)'
size: 54
patterns:
  - 'zauctionhouse-decoration'
  - 'zauctionhouse-pagination'
  - 'zauctionhouse-back'
items:
  items:
    type: ZAUCTIONHOUSE_HISTORY_ITEMS
    loading-slot: 22
    slots:
      - 9-17
      - 18-26
      - 27-35
      - 36-44
    item:
      material: BARRIER
      name: "#ff0000Đang tải..."
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nChưa có lịch sử'
        lore:
          - ''
          - '&7Bạn chưa bán vật phẩm nào.'
  sort:
    type: ZAUCTIONHOUSE_HISTORY_SORT
    slot: 51
    enable-text: ' #F27438➜ %sorting%'
    disable-text: ' #76CDCD➜ %sorting%'
    sorts:
      - DATE_DESC
      - DATE_ASC
      - PRICE_DESC
      - PRICE_ASC
      - BUYER_ASC
      - BUYER_DESC
    sort-names:
      DATE_DESC: "Mới nhất"
      DATE_ASC: "Cũ nhất"
      PRICE_DESC: "Giá cao nhất"
      PRICE_ASC: "Giá thấp nhất"
      BUYER_ASC: "Người mua A-Z"
      BUYER_DESC: "Người mua Z-A"
    item:
      material: HOPPER
      name: "#2CCED2<bold>Sắp xếp"
      lore:
        - "#92ffffCác kiểu sắp xếp:"
        - "%DATE_DESC%"
        - "%DATE_ASC%"
        - "%PRICE_DESC%"
        - "%PRICE_ASC%"
        - "%BUYER_ASC%"
        - "%BUYER_DESC%"
        - ""
        - "#8c8c8c• #2CCED2Click #92ffffđể thay đổi"
