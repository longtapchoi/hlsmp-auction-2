################################################################################################################################
#
#   zAuctionHouse V4 - Configuration des Règles d'Items
#
#   Ce fichier définit quels items peuvent ou ne peuvent pas être vendus sur l'hôtel des ventes.
#   Utilisez la liste noire pour bloquer des items spécifiques, ou la liste blanche pour autoriser uniquement des items spécifiques.
#
#   ASTUCE: Vous pouvez sauvegarder des items en format Base64 avec /zmenu save <nom de l'item>
#           Puis les référencer dans vos règles pour une correspondance exacte d'item.
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# RÉFÉRENCE DES TYPES DE RÈGLES
#=============================================================================
#
# RÈGLES DE MATÉRIAU:
#   type: material
#   materials:
#     - DIAMOND
#     - EMERALD
#   Description: Fait correspondre les items par leur type de matériau Minecraft.
#
# RÈGLES DE SUFFIXE DE MATÉRIAU:
#   type: material-suffix
#   suffixes:
#     - "_SWORD"
#     - "_HELMET"
#   Description: Fait correspondre les matériaux se terminant par le suffixe spécifié.
#
# RÈGLES DE NOM:
#   type: name
#   mode: CONTAINS | EQUALS | STARTS_WITH | ENDS_WITH | REGEX
#   values:
#     - "Spécial"
#   Description: Fait correspondre les items par leur nom d'affichage.
#
# RÈGLES DE LORE:
#   type: lore
#   mode: CONTAINS | EQUALS | STARTS_WITH | ENDS_WITH | REGEX
#   values:
#     - "Lié à l'âme"
#   Description: Fait correspondre les items qui ont un texte spécifique dans leur lore.
#
# RÈGLES DE CUSTOM MODEL DATA:
#   type: custom-model-data
#   values:
#     - 1001
#     - 1002
#   Description: Fait correspondre les items avec des valeurs CustomModelData spécifiques.
#
# RÈGLES DE TAG:
#   type: tag
#   tags:
#     - BLOCKS
#     - ITEMS
#   Description: Fait correspondre les items en utilisant les tags Bukkit/Paper.
#
# RÈGLES NBT:
#   type: nbt
#   path: "custom.data.key"
#   value: "valeur_attendue"
#   Description: Fait correspondre les items avec des données NBT spécifiques.
#
# RÈGLES DE COMBINAISON:
#   type: and
#   rules:
#     - <règle1>
#     - <règle2>
#   Description: TOUTES les règles doivent correspondre (ET logique).
#
#   type: or
#   rules:
#     - <règle1>
#     - <règle2>
#   Description: N'IMPORTE QUELLE règle doit correspondre (OU logique).
#
#=============================================================================
# RÈGLES DE PLUGINS D'ITEMS PERSONNALISÉS
#=============================================================================
#
# Ces types de règles s'intègrent avec les plugins d'items personnalisés populaires.
# Les items sont correspondus par leurs identifiants spécifiques au plugin.
# Supporte les jokers (*) pour la correspondance par motif.
#
# ITEMSADDER:
#   type: itemsadder
#   items:
#     - "namespace:item_id"      # Correspondance exacte
#     - "namespace:*"            # Tous les items du namespace
#
# ORAXEN:
#   type: oraxen
#   items:
#     - "epee_personnalisee"     # Correspondance exacte
#     - "*_armure"               # Correspondance par motif
#
# NEXO:
#   type: nexo
#   items:
#     - "lame_mythique"
#     - "special_*"
#
# MMOITEMS:
#   type: mmoitems
#   items:
#     - "SWORD:CUTLASS"          # Format TYPE:ID
#     - "SWORD:*"                # Tous les items de type SWORD
#     - "*:ITEM_LEGENDAIRE"      # N'importe quel type avec cet ID
#
# EXECUTABLEITEMS:
#   type: executableitems
#   items:
#     - "baguette_personnalisee"
#
# ECOITEMS:
#   type: ecoitems
#   items:
#     - "larme_packmaster"
#
# CRUCIBLE (MythicCrucible):
#   type: crucible
#   items:
#     - "lame_mythique"
#
# SLIMEFUN:
#   type: slimefun
#   items:
#     - "ELECTRIC_MOTOR"
#
# HEADDATABASE:
#   type: headdatabase
#   items:
#     - "12345"
#
# NOVA:
#   type: nova
#   items:
#     - "machines:four_electrique"
#
# DENIZEN:
#   type: denizen
#   items:
#     - "mon_script_personnalise"
#
# ADVANCEDITEMS:
#   type: advanceditems
#   items:
#     - "baton_magique"
#
# CUSTOMCRAFTING (WolfyUtilities):
#   type: customcrafting
#   items:
#     - "monnamespace:item_personnalise"
#
# ZHEAD:
#   type: zhead
#   items:
#     - "id_tete_personnalisee"
#
# MAGICCOSMETICS:
#   type: magiccosmetics
#   items:
#     - "chapeau_couronne"
#
# HMCCOSMETICS:
#   type: hmccosmetics
#   items:
#     - "ailes_dorees"
#
# ZITEMS:
#   type: zitems
#   items:
#     - "gemme_personnalisee"
#
# CRAFTENGINE:
#   type: craftengine
#   items:
#     - "namespace:bloc_personnalise"
#
# EXECUTABLEBLOCKS:
#   type: executableblocks
#   items:
#     - "coffre_magique"
#
#=============================================================================

#=============================================================================
# CONFIGURATION DE LA LISTE NOIRE
#=============================================================================
# Les items correspondant à N'IMPORTE QUELLE règle de cette liste NE PEUVENT PAS être vendus sur l'hôtel des ventes.
# La liste noire est vérifiée AVANT la liste blanche.
# Si un item correspond à une règle de liste noire, il est bloqué quel que soit la liste blanche.

blacklist:
  # Activer ou désactiver le système de liste noire
  # Quand désactivé, aucun item n'est bloqué (sauf si la liste blanche est activée).
  enabled: true

  # Liste de règles définissant les items bloqués
  # Un item correspondant à N'IMPORTE LAQUELLE de ces règles sera bloqué de la vente.
  rules:

    #-------------------------------------------------------------------------
    # EXEMPLE: Bloquer le bedrock (empêche la vente d'items admin)
    #-------------------------------------------------------------------------
    - type: material
      materials:
        - BEDROCK

    #-------------------------------------------------------------------------
    # EXEMPLE: Bloquer les items avec un lore "Inéchangeable" ET un model data spécifique
    # Ceci démontre la combinaison de plusieurs conditions avec 'and'.
    #-------------------------------------------------------------------------
    - type: and
      rules:
        # Condition 1: L'item doit avoir "Inéchangeable" quelque part dans son lore
        - type: lore
          mode: CONTAINS
          values:
            - "Inéchangeable"
        # Condition 2: L'item doit avoir un CustomModelData de 1001
        - type: custom-model-data
          values:
            - 1001

    #=========================================================================
    # EXEMPLES DE PLUGINS D'ITEMS PERSONNALISÉS
    #=========================================================================
    # Décommentez et modifiez ces exemples pour les utiliser avec vos plugins d'items personnalisés.
    # Chaque exemple montre le nom du plugin et les motifs de configuration courants.

    #-------------------------------------------------------------------------
    # ItemsAdder - Bloquer des items ItemsAdder spécifiques
    #-------------------------------------------------------------------------
    # - type: itemsadder
    #   items:
    #     - "namespace:item_id"       # Bloquer un item spécifique
    #     - "namespace:*"             # Bloquer TOUS les items de ce namespace
    #     - "monnamespace:rare_*"     # Bloquer les items commençant par "rare_"

    #-------------------------------------------------------------------------
    # Oraxen - Bloquer des items Oraxen spécifiques
    #-------------------------------------------------------------------------
    # - type: oraxen
    #   items:
    #     - "epee_personnalisee"      # Bloquer un item spécifique
    #     - "*_armure"                # Bloquer tous les items finissant par "_armure"
    #     - "event_*"                 # Bloquer tous les items d'événement

    #-------------------------------------------------------------------------
    # Nexo - Bloquer des items Nexo spécifiques
    #-------------------------------------------------------------------------
    # - type: nexo
    #   items:
    #     - "lame_mythique"
    #     - "special_*"               # Bloquer tous les items commençant par "special_"
    #     - "*_lieame"                # Bloquer tous les items liés à l'âme

    #-------------------------------------------------------------------------
    # MMOItems - Bloquer des MMOItems spécifiques (format TYPE:ID)
    #-------------------------------------------------------------------------
    # - type: mmoitems
    #   items:
    #     - "SWORD:CUTLASS"           # Bloquer une épée spécifique
    #     - "SWORD:*"                 # Bloquer TOUTES les épées
    #     - "*:ITEM_LEGENDAIRE"       # Bloquer l'ID d'item quel que soit le type
    #     - "TOOL:*"                  # Bloquer tous les outils

    #-------------------------------------------------------------------------
    # ExecutableItems - Bloquer des ExecutableItems spécifiques
    #-------------------------------------------------------------------------
    # - type: executableitems
    #   items:
    #     - "baguette_personnalisee"
    #     - "voucher_*"               # Bloquer tous les vouchers
    #     - "admin_*"                 # Bloquer les items admin

    #-------------------------------------------------------------------------
    # EcoItems - Bloquer des EcoItems spécifiques
    #-------------------------------------------------------------------------
    # - type: ecoitems
    #   items:
    #     - "larme_packmaster"
    #     - "charme_*"                # Bloquer tous les charmes

    #-------------------------------------------------------------------------
    # MythicCrucible - Bloquer des items Crucible spécifiques
    #-------------------------------------------------------------------------
    # - type: crucible
    #   items:
    #     - "lame_mythique"
    #     - "donjon_*"                # Bloquer le butin de donjon

    #-------------------------------------------------------------------------
    # Slimefun - Bloquer des items Slimefun spécifiques
    #-------------------------------------------------------------------------
    # - type: slimefun
    #   items:
    #     - "ELECTRIC_MOTOR"
    #     - "*_INGOT"                 # Bloquer tous les lingots personnalisés
    #     - "CARGO_*"                 # Bloquer les items cargo

    #-------------------------------------------------------------------------
    # HeadDatabase - Bloquer des têtes HeadDatabase spécifiques
    #-------------------------------------------------------------------------
    # - type: headdatabase
    #   items:
    #     - "12345"                   # Bloquer une tête spécifique par ID
    #     - "123*"                    # Bloquer les têtes avec des IDs commençant par 123

    #-------------------------------------------------------------------------
    # Nova - Bloquer des items Nova spécifiques
    #-------------------------------------------------------------------------
    # - type: nova
    #   items:
    #     - "machines:four_electrique"
    #     - "machines:*"              # Bloquer tous les items de l'addon machines
    #     - "*:panneau_solaire"       # Bloquer les panneaux solaires de n'importe quel addon

    #-------------------------------------------------------------------------
    # Denizen - Bloquer des items scriptés Denizen spécifiques
    #-------------------------------------------------------------------------
    # - type: denizen
    #   items:
    #     - "mon_script_personnalise"
    #     - "*_arme"                  # Bloquer les scripts d'armes

    #-------------------------------------------------------------------------
    # AdvancedItems - Bloquer des AdvancedItems spécifiques
    #-------------------------------------------------------------------------
    # - type: advanceditems
    #   items:
    #     - "baton_magique"
    #     - "rpg_*"                   # Bloquer les items RPG

    #-------------------------------------------------------------------------
    # CustomCrafting/WolfyUtilities - Bloquer des items personnalisés spécifiques
    #-------------------------------------------------------------------------
    # - type: customcrafting
    #   items:
    #     - "monnamespace:item_personnalise"
    #     - "monnamespace:*"          # Bloquer tout du namespace

    #-------------------------------------------------------------------------
    # zHead - Bloquer des têtes zHead spécifiques
    #-------------------------------------------------------------------------
    # - type: zhead
    #   items:
    #     - "id_tete_personnalisee"
    #     - "categorie_*"             # Bloquer une catégorie entière

    #-------------------------------------------------------------------------
    # MagicCosmetics - Bloquer des items MagicCosmetics spécifiques
    #-------------------------------------------------------------------------
    # - type: magiccosmetics
    #   items:
    #     - "chapeau_couronne"
    #     - "sac_*"                   # Bloquer tous les sacs

    #-------------------------------------------------------------------------
    # HMCCosmetics - Bloquer des items HMCCosmetics spécifiques
    #-------------------------------------------------------------------------
    # - type: hmccosmetics
    #   items:
    #     - "ailes_dorees"
    #     - "aura_*"                  # Bloquer toutes les auras

    #-------------------------------------------------------------------------
    # zItems - Bloquer des items zItems spécifiques
    #-------------------------------------------------------------------------
    # - type: zitems
    #   items:
    #     - "gemme_personnalisee"
    #     - "amelioration_*"          # Bloquer les items d'amélioration

    #-------------------------------------------------------------------------
    # CraftEngine - Bloquer des items CraftEngine spécifiques
    #-------------------------------------------------------------------------
    # - type: craftengine
    #   items:
    #     - "namespace:bloc_personnalise"
    #     - "namespace:*"             # Bloquer tout du namespace

    #-------------------------------------------------------------------------
    # ExecutableBlocks - Bloquer des ExecutableBlocks spécifiques
    #-------------------------------------------------------------------------
    # - type: executableblocks
    #   items:
    #     - "coffre_magique"
    #     - "teleporteur_*"           # Bloquer les blocs téléporteurs

#=============================================================================
# CONFIGURATION DE LA LISTE BLANCHE
#=============================================================================
# Quand activé, SEULS les items correspondant à une règle de liste blanche peuvent être vendus.
# Tous les autres items sont automatiquement bloqués.
# La liste blanche est vérifiée APRÈS la liste noire.
#
# CAS D'UTILISATION:
# - Créer un hôtel des ventes spécialisé (ex: uniquement des livres enchantés)
# - Limiter les items échangeables pour les serveurs d'événements
# - Restreindre l'économie à des types d'items spécifiques

whitelist:
  # Activer ou désactiver le système de liste blanche
  # Quand désactivé, tous les items sont autorisés (sauf bloqués par la liste noire).
  # Quand activé, SEULS les items correspondant aux règles de liste blanche peuvent être vendus.
  enabled: false

  # Liste de règles définissant les items autorisés
  # Un item doit correspondre à AU MOINS UNE règle pour être vendable.
  rules:

    #-------------------------------------------------------------------------
    # EXEMPLE: Autoriser uniquement les Étoiles du Nether avec "Voucher" dans leur nom
    # Ceci crée un hôtel des ventes réservé aux vouchers.
    #-------------------------------------------------------------------------
    - type: and
      rules:
        # Condition 1: Doit être une Étoile du Nether
        - type: material
          materials:
            - NETHER_STAR
        # Condition 2: Doit avoir "Voucher" dans le nom d'affichage
        - type: name
          mode: CONTAINS
          values:
            - "Voucher"

    #-------------------------------------------------------------------------
    # Exemples de liste blanche supplémentaires (décommenter pour utiliser):
    #-------------------------------------------------------------------------

    # Autoriser uniquement les armes
    # - type: material-suffix
    #   suffixes:
    #     - "_SWORD"
    #     - "_AXE"

    # Autoriser uniquement les items avec un lore spécifique (ex: "Échangeable")
    # - type: lore
    #   mode: CONTAINS
    #   values:
    #     - "Échangeable"

    # Autoriser des types MMOItems spécifiques
    # - type: mmoitems
    #   items:
    #     - "WEAPON:*"
    #     - "ARMOR:*"
