################################################################################################################################
#
#   zAuctionHouse V4 - Inventaire des Catégories
#
#   Cet inventaire affiche le menu de sélection des catégories.
#   Les joueurs peuvent choisir une catégorie pour filtrer les items.
#
#   LES CATÉGORIES SONT DÉFINIES DANS:
#   - categories.yml - Définit quels items appartiennent à chaque catégorie
#   - Ce fichier - Définit les boutons GUI pour chaque catégorie
#
#   AJOUTER DE NOUVELLES CATÉGORIES:
#   1. Ajoutez la définition de catégorie dans categories.yml (avec les règles)
#   2. Ajoutez un bouton ici avec type: ZAUCTIONHOUSE_CATEGORY et category: <nom>
#   3. Utilisez le placeholder %zauctionhouse_category_count_<nom>% pour les compteurs
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# PARAMÈTRES DE L'INVENTAIRE
#=============================================================================

# Titre de l'inventaire - texte statique pour le menu des catégories.
name: "#0c1719Catégories"

# Taille de l'inventaire - 6 rangées (54 slots).
size: 54

#=============================================================================
# PATTERNS
#=============================================================================

patterns:
  # Bordures décoratives en vitres.
  - 'zauctionhouse-decoration'
  # Bouton retour pour revenir à l'hôtel des ventes.
  - 'zauctionhouse-back'

#=============================================================================
# BOUTONS DE CATÉGORIES
#=============================================================================
# Chaque bouton ouvre l'hôtel des ventes filtré par cette catégorie.
# Les types de boutons utilisent ZAUCTIONHOUSE_CATEGORY avec un champ 'category'.
# La valeur 'category' doit correspondre à une clé de categories.yml.

items:

  #---------------------------------------------------------------------------
  # CATÉGORIE TOUS LES ITEMS
  #---------------------------------------------------------------------------
  # Affiche tous les items quel que soit le type (pas de filtrage).
  # C'est la vue par défaut lors de la première ouverture de l'hôtel des ventes.

  all-items:
    # Type de bouton pour la sélection de catégorie.
    type: ZAUCTIONHOUSE_CATEGORY

    # Identifiant de catégorie - 'all' est une catégorie spéciale montrant tout.
    category: all

    # Position du slot - centre de la rangée du haut (hors décoration).
    slot: 4

    item:
      material: CHEST
      name: "#2CCED2<bold>ᴛᴏᴜs ʟᴇs ɪᴛᴇᴍs"
      lore:
        - "#92ffffVoir toutes les annonces"
        - ""
        # %zauctionhouse_category_count_all% affiche le total d'items.
        - "#92ffffTotal d'items#8c8c8c: #2CCED2%zauctionhouse_category_count_all%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"

  #---------------------------------------------------------------------------
  # CATÉGORIE BLOCS
  #---------------------------------------------------------------------------
  # Affiche uniquement les blocs plaçables.

  blocks:
    type: ZAUCTIONHOUSE_CATEGORY
    # Doit correspondre à la clé dans categories.yml
    category: blocks
    slot: 19

    item:
      # Matériau représentatif pour cette catégorie.
      material: GRASS_BLOCK
      name: "#7a7a7a<bold>ʙʟᴏᴄs"
      lore:
        - "#92ffffTous les blocs de construction"
        - ""
        # Compteur dynamique d'items pour cette catégorie.
        - "#92ffffItems#8c8c8c: #2CCED2%zauctionhouse_category_count_blocks%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"

  #---------------------------------------------------------------------------
  # CATÉGORIE ARMES
  #---------------------------------------------------------------------------
  # Affiche les épées, arcs, arbalètes et autres armes.

  weapons:
    type: ZAUCTIONHOUSE_CATEGORY
    category: weapons
    slot: 20

    item:
      material: DIAMOND_SWORD
      name: "#ff5555<bold>ᴀʀᴍᴇs"
      lore:
        - "#92ffffÉquipement de combat"
        - "#92ffffÉpées, arcs, arbalètes..."
        - ""
        - "#92ffffItems#8c8c8c: #2CCED2%zauctionhouse_category_count_weapons%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"

  #---------------------------------------------------------------------------
  # CATÉGORIE ARMURES
  #---------------------------------------------------------------------------
  # Affiche les casques, plastrons, jambières, bottes et boucliers.

  armor:
    type: ZAUCTIONHOUSE_CATEGORY
    category: armor
    slot: 21

    item:
      material: DIAMOND_CHESTPLATE
      name: "#55ffff<bold>ᴀʀᴍᴜʀᴇs"
      lore:
        - "#92ffffÉquipement de protection"
        - ""
        - "#92ffffItems#8c8c8c: #2CCED2%zauctionhouse_category_count_armor%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"

  #---------------------------------------------------------------------------
  # CATÉGORIE OUTILS
  #---------------------------------------------------------------------------
  # Affiche les pioches, haches, pelles, houes et autres outils.

  tools:
    type: ZAUCTIONHOUSE_CATEGORY
    category: tools
    slot: 22

    item:
      material: DIAMOND_PICKAXE
      name: "#ffff55<bold>ᴏᴜᴛɪʟs"
      lore:
        - "#92ffffOutils de minage et d'agriculture"
        - ""
        - "#92ffffItems#8c8c8c: #2CCED2%zauctionhouse_category_count_tools%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"

  #---------------------------------------------------------------------------
  # CATÉGORIE CONSOMMABLES
  #---------------------------------------------------------------------------
  # Affiche les potions, nourriture et autres items consommables.

  consumables:
    type: ZAUCTIONHOUSE_CATEGORY
    category: consumables
    slot: 23

    item:
      material: GOLDEN_APPLE
      name: "#55ff55<bold>ᴄᴏɴsᴏᴍᴍᴀʙʟᴇs"
      lore:
        - "#92ffffNourriture et potions"
        - ""
        - "#92ffffItems#8c8c8c: #2CCED2%zauctionhouse_category_count_consumables%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"

  #---------------------------------------------------------------------------
  # CATÉGORIE RESSOURCES
  #---------------------------------------------------------------------------
  # Affiche les minerais, lingots et matériaux d'artisanat.

  resources:
    type: ZAUCTIONHOUSE_CATEGORY
    category: resources
    slot: 24

    item:
      material: DIAMOND
      name: "#ffaa00<bold>ʀᴇssᴏᴜʀᴄᴇs"
      lore:
        - "#92ffffMinerais et matériaux"
        - ""
        - "#92ffffItems#8c8c8c: #2CCED2%zauctionhouse_category_count_resources%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"

  #---------------------------------------------------------------------------
  # CATÉGORIE LIVRES ENCHANTÉS
  #---------------------------------------------------------------------------
  # Affiche uniquement les livres enchantés.

  enchanted-books:
    type: ZAUCTIONHOUSE_CATEGORY
    category: enchanted-books
    slot: 25

    item:
      material: ENCHANTED_BOOK
      name: "#ff55ff<bold>ʟɪᴠʀᴇs ᴇɴᴄʜᴀɴᴛᴇs"
      lore:
        - "#92ffffLivres avec enchantements"
        - ""
        - "#92ffffItems#8c8c8c: #2CCED2%zauctionhouse_category_count_enchanted-books%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"

  #---------------------------------------------------------------------------
  # CATÉGORIE DIVERS
  #---------------------------------------------------------------------------
  # Affiche les items qui ne rentrent pas dans les autres catégories.

  misc:
    type: ZAUCTIONHOUSE_CATEGORY
    category: misc
    slot: 31

    item:
      material: CHEST
      name: "#555555<bold>ᴅɪᴠᴇʀs"
      lore:
        - "#92ffffAutres items"
        - ""
        - "#92ffffItems#8c8c8c: #2CCED2%zauctionhouse_category_count_misc%"
        - ""
        - "#8c8c8c• #2CCED2Cliquez #92ffffpour parcourir"
