################################################################################################################################
#
#   zAuctionHouse V4 - Pattern de Décoration
#
#   Ce fichier de pattern fournit des panneaux de verre décoratifs pour les bordures d'inventaire.
#   Il est réutilisé dans plusieurs inventaires pour maintenir un style cohérent.
#
#   FONCTIONNEMENT DES PATTERNS :
#   - Les patterns sont des modèles d'inventaire réutilisables
#   - Ils peuvent être inclus dans n'importe quel inventaire via la liste 'patterns'
#   - Plusieurs patterns peuvent être combinés dans un seul inventaire
#   - Les items des patterns peuvent être remplacés par l'inventaire qui les inclut
#
#   UTILISATION :
#   Incluez ce pattern dans vos fichiers d'inventaire :
#     patterns:
#       - 'zauctionhouse-decoration'
#
#   Documentation : https://docs.groupez.dev/zauctionhouse/introduction
#   Discord : https://discord.groupez.dev/
#
################################################################################################################################

# Nom du pattern - référencé dans les autres fichiers d'inventaire.
# Doit être unique parmi tous les fichiers de pattern.
name: "zauctionhouse-decoration"

# Taille de l'inventaire (doit correspondre aux inventaires utilisant ce pattern).
# Tailles standards : 9, 18, 27, 36, 45, 54
# Ce pattern est conçu pour les inventaires à 6 lignes (54 slots).
size: 54

# Items dans ce pattern.
# Ils sont placés dans l'inventaire lorsque le pattern est appliqué.
items:

  # Bordure de panneaux de verre décoratifs
  decoration:
    # Quand true, cet item ne peut pas être déplacé ou pris par les joueurs.
    # Toujours utiliser is-permanent: true pour les items de décoration.
    is-permanent: true

    # Slots où cet item apparaît.
    # Plages de slots : '0-8' signifie slots 0, 1, 2, 3, 4, 5, 6, 7, 8
    # Ceci crée une bordure en haut et en bas.
    #
    # DISPOSITION DES SLOTS (inventaire 54 slots) :
    # Ligne 1 (haut) :   0  1  2  3  4  5  6  7  8
    # Ligne 2 :          9 10 11 12 13 14 15 16 17
    # Ligne 3 :         18 19 20 21 22 23 24 25 26
    # Ligne 4 :         27 28 29 30 31 32 33 34 35
    # Ligne 5 :         36 37 38 39 40 41 42 43 44
    # Ligne 6 (bas) :   45 46 47 48 49 50 51 52 53
    slots:
      - '0-8'     # Ligne du haut (9 slots)
      - '45-53'   # Ligne du bas (9 slots)

    # Configuration de l'item
    item:
      # Type de matériau - utiliser les variantes STAINED_GLASS_PANE pour la décoration.
      # Couleurs disponibles : WHITE, ORANGE, MAGENTA, LIGHT_BLUE, YELLOW, LIME,
      # PINK, GRAY, LIGHT_GRAY, CYAN, PURPLE, BLUE, BROWN, GREEN, RED, BLACK
      material: LIGHT_BLUE_STAINED_GLASS_PANE

      # Nom de l'item - défini sur un code couleur seul pour le rendre vide.
      # Utiliser juste "<white>" masque le nom tout en empêchant le nom par défaut.
      name: "<white>"
