name: Extract Source ZIP

on:
  push:
    paths:
      - '*.zip'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and extract ZIP
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -1)
          echo "Found ZIP: $ZIP"
          unzip -o "$ZIP" -x "*.zip"
          rm "$ZIP"

      - name: Commit extracted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: extract source from ZIP" || echo "Nothing to commit"
          git push
